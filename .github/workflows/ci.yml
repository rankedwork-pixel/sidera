name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,dashboard]"
          pip install fakeredis aiosqlite

      - name: Lint
        run: ruff check src/ tests/ dashboard/

      - name: Format check
        run: ruff format --check src/ tests/ dashboard/

      - name: Type check (optional)
        run: mypy src/ --ignore-missing-imports || true
        continue-on-error: true

      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=src --cov-report=xml
        env:
          APP_ENV: testing

      - name: Doc sync validation
        run: python scripts/doc_sync.py
        # Uses pytest for accurate test count (already installed above)

      - name: Upload coverage
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
        continue-on-error: true
