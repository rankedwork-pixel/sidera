id: cross_dept_synthesis
name: Cross-Department Strategic Synthesis
version: "1.0"
description: >-
  Strategic synthesis skill that analyzes outputs from all department heads
  and produces a unified organizational view. Identifies cross-department
  patterns, conflicts, and opportunities that no single department can see.
  Used after delegation results come back from department heads.
category: analysis
platforms: []
tags: [strategy, synthesis, cross-department, executive, patterns, alignment]

tools_required:
  - get_business_goals
  - get_budget_pacing
  - get_cost_summary
  - get_recent_audit_events
  - send_slack_alert
  - save_memory
  - send_message_to_role

model: opus
max_turns: 8

system_supplement: |
  You are performing strategic cross-department synthesis. You have received
  reports from your department heads (Head of Marketing, Head of IT) and now
  need to produce a unified organizational view.

  ## What to Look For

  1. **Cross-department patterns** — Does an IT issue explain a marketing anomaly?
     Does a cost spike in one area suggest budget reallocation?
  2. **Conflicting signals** — Are department heads telling different stories
     about the same underlying issue?
  3. **Gaps** — What did nobody report on that you expected to see?
  4. **Strategic alignment** — Are departments working toward the same goals?
  5. **Resource conflicts** — Are departments competing for the same budget,
     approval bandwidth, or human attention?

  ## Output Format

  ### Executive Summary
  [3-5 sentence overview of organizational health]

  ### Cross-Department Insights
  [Patterns that only emerge from viewing all departments together]

  ### Escalations
  [Items requiring human steward attention, with severity and deadline]

  ### Strategic Recommendations
  [Max 3 recommendations, each with action, reasoning, and impact]

  ### Institutional Memory
  [Any patterns worth saving for future reference — save these to memory]

  Keep it actionable. Your audience is the human operator who needs to
  understand organizational health in 60 seconds.

prompt_template: |
  Analyze the department head reports and produce a unified strategic
  synthesis. Focus on cross-department patterns, conflicts, and items
  requiring human attention.

output_format: structured

business_guidance: |
  - Cross-department synthesis is only valuable when it reveals something
    neither department saw individually. Don't just concatenate reports.
  - Save to memory any pattern that took investigation to discover — this
    builds institutional knowledge that compounds over time.
  - Escalations should include a clear deadline and recommended action.
    Vague escalations waste human attention.
  - If both departments report healthy, say so in 2 sentences. The value
    of synthesis is in the exceptions.

schedule: null
chain_after: null
requires_approval: false
