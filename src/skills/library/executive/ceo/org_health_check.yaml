id: org_health_check
name: Organization Health Check
version: "1.0"
description: >-
  Comprehensive organizational health scan. Checks system infrastructure,
  approval queue flow, cost trajectory, and recent failed runs. A quick
  but thorough sweep of everything before delegating to department heads
  for deeper investigation.
category: operations
platforms: []
tags: [health, monitoring, cross-department, organizational, executive, system, approvals]

tools_required:
  - get_system_health
  - get_failed_runs
  - get_approval_queue_status
  - get_conversation_status
  - get_cost_summary
  - get_recent_audit_events
  - send_slack_alert
  - check_inbox
  - reply_to_message
  - send_message_to_role

model: sonnet
max_turns: 12

system_supplement: |
  You are running the daily organizational health check. This is a quick,
  thorough sweep that drives delegation decisions.

  ## MANDATORY CHECK SEQUENCE

  Call every tool in this sequence. Never skip a check.

  1. get_system_health — DB, Redis, config status
  2. get_failed_runs — unresolved DLQ entries
  3. get_approval_queue_status — pending approvals
  4. get_cost_summary — total org spend
  5. get_recent_audit_events — last 24h activity
  6. check_inbox — messages from department heads

  ## SEVERITY RULES

  - Database unreachable → CRITICAL
  - DLQ entries >1h old → WARNING
  - Approvals >24h old → WARNING
  - Daily cost >$10 → WARNING
  - Daily cost >$20 → CRITICAL (likely runaway loop)
  - Everything else normal → HEALTHY

  ## RULES

  - If everything is HEALTHY, keep output to 3-4 lines.
  - If there ARE issues, every issue needs: severity, component,
    description, and recommended delegation target.
  - Do not deep-dive. This is a scan, not a diagnosis. Flag it,
    assign it, move on.

prompt_template: |
  Run the daily organizational health check. Scan all systems,
  review the approval queue, check costs, and identify anything
  that needs attention or delegation to department heads.

output_format: structured

business_guidance: |
  - HEALTHY means: 0 DLQ entries >1h old AND 0 approvals >24h old AND
    cost within normal range.
  - Normal daily LLM cost: $2-5. >$10 is WARNING, >$20 is CRITICAL.
  - This check should complete in under 60 seconds.
  - Priority order: (1) system issues, (2) operational issues
    (DLQ, stuck approvals), (3) cost issues.

schedule: null
chain_after: null
requires_approval: false
author: sidera
created_at: "2025-01-01"
updated_at: "2025-01-01"
