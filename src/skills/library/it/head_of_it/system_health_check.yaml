id: system_health_check
name: "System Health Check"
version: "1.0"
description: "Comprehensive health check of all Sidera infrastructure components — database, cache, workflows, approvals, and conversations"
category: operations
platforms: []
tags: [health, monitoring, infrastructure, database, redis, uptime, diagnostics]

tools_required:
  - get_system_health
  - get_failed_runs
  - get_approval_queue_status
  - get_conversation_status
  - get_cost_summary
  - send_slack_alert

model: sonnet
max_turns: 8

system_supplement: |
  You are running a scheduled system health check. Your job is to verify
  every infrastructure component and flag issues with zero ambiguity.

  ## MANDATORY CHECK SEQUENCE — you MUST execute every step in order

  1. **FIRST:** Call get_system_health. This is ALWAYS your first tool call.
     NEVER skip this step. NEVER call any other tool before this one.
     If this call fails, your entire report MUST open with
     "⚠️ UNABLE TO REACH SYSTEM HEALTH ENDPOINT" and you MUST send
     a CRITICAL Slack alert immediately.

  2. **SECOND:** Call get_failed_runs to check the DLQ.
     You MUST check for unresolved entries. If any exist, you MUST
     record the count and the age of the oldest entry.

  3. **THIRD:** Call get_approval_queue_status for stuck/expired items.
     You MUST report the count of pending approvals and the age of
     the oldest one. If any approval is older than 48h, you MUST
     classify it as WARNING.

  4. **FOURTH:** Call get_conversation_status.
     You MUST flag any conversation with >15 turns.

  5. **FIFTH:** Call get_cost_summary.
     You MUST compare today's spend against the 7-day average.
     If today exceeds 2x the average, this is a WARNING.

  ## SEVERITY CLASSIFICATION — use these exact thresholds, no exceptions

  - Database unreachable → CRITICAL. Full stop. Nothing else matters.
  - Redis unreachable → WARNING only. System degrades gracefully.
  - Configuration error (missing API keys) → CRITICAL.
  - Unresolved DLQ entries >24h old → WARNING.
  - Pending approvals >48h old → WARNING.
  - Cost spike >2x daily average → WARNING.
  - Cost spike >5x daily average → CRITICAL.
  - Conversation >15 turns → INFO.

  ## ACTION RULES — what you MUST do vs what you MUST NOT do

  - You MUST resolve DLQ entries that are clearly transient (network
    timeout, rate limit, temporary API failure). Include a resolution
    note explaining why it was transient.
  - You MUST NOT resolve DLQ entries caused by auth failures, schema
    issues, or code bugs. Those require human intervention.
  - You MUST send a Slack alert if ANY finding is WARNING or CRITICAL.
  - You MUST NOT send a Slack alert if all findings are HEALTHY or INFO.
    Unnecessary alerts erode trust.
  - You MUST NOT skip any step in the check sequence. If a tool call
    fails, report the failure — do not silently omit the section.

prompt_template: |
  Run a comprehensive system health check for Sidera.
  Check date: {analysis_date}

  Verify all infrastructure components, review the dead letter queue,
  check for stuck approvals, and monitor costs. Flag anything concerning
  and take corrective action where possible (e.g., resolving transient
  DLQ entries).

output_format: |
  ## System Health Report — {date}

  ### Overall Status
  One-line summary: HEALTHY / DEGRADED / CRITICAL

  ### Component Status
  Table: Component | Status | Details
  (Database, Redis, Slack, Anthropic API, Configuration)

  ### Issues Found
  For each issue:
  - Severity: CRITICAL / WARNING / INFO
  - Component: Which part of the system
  - Description: What's wrong
  - Action Taken: What you did (or "Requires human intervention")
  - Recommendation: How to prevent recurrence

  ### DLQ Summary
  - Unresolved count and brief description of each
  - Any entries you resolved and why

  ### Approval Queue
  - Pending count and age of oldest
  - Any stuck/forgotten approvals

  ### Cost Summary
  - Today's spend vs 7-day average
  - Any anomalies

business_guidance: |
  - HEALTHY means: 0 unresolved DLQ entries AND 0 pending approvals >24h
    AND all connectors authenticated AND cost within 2x average. If ANY
    of these conditions fail, the system is NOT HEALTHY.
  - You MUST distinguish transient from persistent errors before resolving:
    - TRANSIENT (safe to resolve): network timeouts, rate limits, 503s,
      temporary API failures, connection resets
    - PERSISTENT (NEVER resolve): auth failures (401/403), schema errors,
      code exceptions, missing configuration, data corruption
    If you resolve a persistent error, you are hiding a real problem.
  - Cost thresholds: >$10/day warrants a WARNING. >$25/day warrants a
    CRITICAL. During E2E testing, costs are expected to be higher —
    note this context but still flag the numbers.
  - Redis down = WARNING. Database down = CRITICAL. NEVER confuse these
    severity levels. Redis is a cache; the database is the source of truth.
  - Missing API keys during initial setup: still CRITICAL, but add context
    "Expected during setup — keys needed: [list]".

schedule: null
chain_after: null
requires_approval: false
