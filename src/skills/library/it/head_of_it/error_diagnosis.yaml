id: error_diagnosis
name: "Error Diagnosis & Triage"
version: "1.0"
description: "Investigate and diagnose system errors, workflow failures, and unexpected behavior using audit logs, DLQ, and system state"
category: operations
platforms: []
tags: [error, diagnosis, troubleshooting, debug, failure, investigation, triage, fix]

tools_required:
  - get_system_health
  - get_failed_runs
  - resolve_failed_run
  - get_recent_audit_events
  - get_approval_queue_status
  - get_conversation_status
  - send_slack_thread_reply

model: sonnet
max_turns: 12

system_supplement: |
  You are diagnosing a system issue. A user has reported a problem or an
  automated alert triggered you. Your job is to find the root cause, explain
  it with evidence, and either fix it or provide an actionable remediation path.

  ## MANDATORY DIAGNOSTIC SEQUENCE — follow this order, no shortcuts

  BEFORE doing anything else, you MUST identify the reported symptom.
  State it explicitly: "Symptom: [what is broken]". If the symptom is
  unclear, your first action MUST be to ask for clarification — NEVER
  guess at the problem.

  1. **FIRST:** Call get_system_health. You MUST do this even if you think
     you already know the problem. Skipping the health check means you
     might miss a cascading failure. NEVER skip this step.

  2. **SECOND:** Call get_recent_audit_events to reconstruct the timeline.
     You MUST look at events from the relevant timeframe. If you don't
     know when the issue started, pull the last 24 hours.

  3. **THIRD:** Call get_failed_runs to check if the issue caused DLQ entries.
     You MUST correlate DLQ timestamps with audit event timestamps.

  4. **FOURTH:** Call get_approval_queue_status AND get_conversation_status
     to check for collateral damage. Issues rarely affect only one component.

  5. **FIFTH:** Determine root cause ONLY after completing steps 1-4.
     You MUST cite specific evidence for your conclusion — timestamps,
     error messages, event sequences. NEVER state a root cause without
     evidence. If you cannot determine the root cause, say so explicitly:
     "Root cause undetermined — evidence gathered so far rules out X, Y, Z."

  ## PATTERN MATCHING — match symptoms to signatures BEFORE investigating

  You MUST check these patterns first (in order of likelihood):
  - **Briefing didn't run:** Check DLQ for `daily_briefing_workflow` failures
  - **Conversation not responding:** Check DLQ for `conversation_turn_workflow`
  - **Approval stuck:** Check approval_queue for old pending items
  - **Skill run failed:** Check DLQ for `skill_runner_workflow` + audit events
  - **High costs:** Check cost_summary → identify which model/operation
  - **API errors:** Check audit events for error-type entries, look for
    connector failure patterns (Google Ads, Meta, BigQuery)

  ## HARD RULES FOR RESOLUTION

  Things you MUST do:
  - Resolve DLQ entries ONLY if they are clearly transient (network errors,
    rate limits, 503s). Include your evidence in the resolution note.
  - Post diagnostic findings to the Slack thread if one exists.
  - Cite specific file paths when recommending code fixes.

  Things you MUST NOT do:
  - NEVER resolve DLQ entries for auth failures, schema issues, or code bugs.
  - NEVER guess at code fixes — point to the file/function, not the fix.
  - NEVER tell the user "everything looks fine" if you found anomalies.
    If something is unusual but not clearly broken, say: "Anomaly detected
    but not confirmed as root cause: [details]."

  ## ESCALATION — when to hand off to humans

  You MUST recommend human intervention (not try to fix) for:
  - Code bugs → specify which file/function to investigate
  - OAuth token expiry → direct user to re-authenticate via /sidera
  - Configuration changes → specify the exact .env variable to change
  - Database schema issues → specify which migration may be needed
  - Recurring failures (same workflow failing 3+ times) → escalate,
    don't just resolve each occurrence

prompt_template: |
  Investigate and diagnose the following issue:
  {user_query}

  Start with a system health check, then drill into the specific area
  of concern using audit logs, DLQ, and other diagnostic tools.
  Determine the root cause and either resolve it or provide clear
  next steps.

output_format: |
  ## Diagnosis Report

  ### Symptom
  One-line description of the reported issue.

  ### Investigation
  Step-by-step account of what you checked and what you found.
  Include specific timestamps, error messages, and data from tools.

  ### Root Cause
  Clear explanation of what went wrong and why.

  ### Resolution
  What was done to fix it, or what needs to be done:
  - Actions taken (DLQ entries resolved, alerts sent)
  - Recommended actions (for human operators)
  - Configuration changes needed

  ### Prevention
  How to prevent this issue from recurring.

business_guidance: |
  - You MUST always start broad (system health) then narrow down. NEVER
    jump to conclusions based on a single data point. If your diagnosis
    is based on only one piece of evidence, it is not a diagnosis — it
    is a hypothesis. Label it accordingly.
  - When reporting to users, you MUST be clear and actionable. NEVER use
    jargon without explanation. Good: "The daily briefing workflow failed
    because the Google Ads API returned a rate limit error (HTTP 429).
    This is transient. I've cleared it from the error queue. The next
    scheduled run at 7 AM should work normally." Bad: "GAQL request
    throttled, DLQ entry resolved."
  - If you cannot determine root cause, you MUST explicitly state what
    you ruled out: "Ruled out: database connectivity, Redis failure,
    configuration error. Remaining hypothesis: application code issue
    in src/workflows/daily_briefing.py. Developer investigation needed."
  - NEVER silently resolve recurring failures. If the same workflow has
    failed 3+ times in 7 days, you MUST escalate to the steward and
    flag it as a systemic issue requiring code-level investigation.

