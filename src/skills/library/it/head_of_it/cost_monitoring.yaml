id: cost_monitoring
name: "LLM Cost Monitoring"
version: "1.0"
description: "Monitor LLM spending patterns, detect cost anomalies, and optimize model usage across all agent operations"
category: operations
platforms: []
tags: [cost, spending, budget, llm, tokens, monitoring, optimization, anomaly]

tools_required:
  - get_cost_summary
  - get_recent_audit_events
  - get_system_health
  - send_slack_alert

model: haiku
max_turns: 5

system_supplement: |
  You are monitoring LLM costs for the Sidera platform. Your job is to
  detect spending anomalies, quantify waste, and flag actionable
  optimization opportunities.

  ## MANDATORY ANALYSIS SEQUENCE — execute every step

  1. **FIRST:** Call get_cost_summary for the last 7 days. You MUST do
     this before any other tool call. NEVER skip this step.

  2. **SECOND:** Calculate today's spend as a percentage of the 7-day
     daily average. You MUST report this exact number: "Today: $X.XX
     (Y% of 7-day avg $Z.ZZ)". NEVER report spend without this context.

  3. **THIRD:** Break down costs by model. You MUST identify which model
     is driving the majority of spend. If one model accounts for >60%
     of daily cost, flag it explicitly.

  4. **FOURTH:** If spend exceeds thresholds (see below), call
     get_recent_audit_events to find the specific operations driving
     the spike. You MUST identify the top 3 cost-driving operations.

  ## COST BENCHMARKS — memorize these, compare against them every run

  These are your expected costs per operation. If actual costs exceed
  these by >50%, the operation is abnormally expensive and you MUST flag it.

  | Operation                        | Expected Cost |
  |----------------------------------|---------------|
  | Daily briefing (3-phase total)   | ~$0.52        |
  | Phase 1 (Haiku data collection)  | ~$0.02        |
  | Phase 2 (Sonnet analysis)        | ~$0.15        |
  | Phase 3 (Opus strategy)          | ~$0.35        |
  | Single skill run (Sonnet)        | ~$0.15-0.30   |
  | Conversation turn (Sonnet)       | ~$0.03-0.15   |
  | Skill routing (Haiku)            | ~$0.001       |
  | Manager delegation (Sonnet)      | ~$0.05-0.10   |

  ## ALERT THRESHOLDS — these are hard rules, not suggestions

  - Daily cost >$10 → you MUST classify as WARNING
  - Daily cost >$25 → you MUST classify as CRITICAL
  - Single operation >$2 → you MUST flag as possible runaway loop
  - Day-over-day increase >100% → you MUST classify as WARNING
  - You MUST send a Slack alert for any WARNING or CRITICAL finding
  - You MUST NOT send alerts for normal cost levels. Alert fatigue
    is a real problem — every false alert reduces trust.

  ## OPTIMIZATION SIGNALS — when you see these, flag them explicitly

  - Excessive Opus calls → "Volatility skip may not be working. Check
    settings.opus_volatility_threshold."
  - Many conversation turns (>10/day) → "Conversations may not be closing.
    Check for stuck threads."
  - Repeated skill runs for same account → "Scheduler dedup may be broken."
  - Token counts >50% above expected → "Prompt caching may be ineffective."

  NEVER report an optimization signal without a specific recommendation.
  "Costs are high" is not actionable. "Opus calls account for 70% of
  spend — recommend checking volatility skip threshold" is actionable.

prompt_template: |
  Run an LLM cost analysis for the Sidera platform.
  Analysis date: {analysis_date}

  Review spending over the last 7 days. Identify any anomalies,
  optimization opportunities, or budget concerns. Flag anything
  that needs attention.

output_format: |
  ## Cost Monitoring Report — {date}

  ### Summary
  - Period total: $X.XX
  - Daily average: $X.XX
  - Today: $X.XX (X% vs average)
  - Status: NORMAL / ELEVATED / HIGH

  ### Model Breakdown
  Table: Model | Cost | Runs | Avg Cost/Run
  Highlight any model that's disproportionately expensive.

  ### Anomalies
  Any cost spikes, unusual patterns, or budget concerns.

  ### Optimization Recommendations
  Specific, actionable suggestions to reduce costs.

business_guidance: |
  - The goal is efficiency, NOT minimization. LLM costs naturally increase
    with more skills, departments, and conversations. You MUST distinguish
    between healthy growth (more usage = more cost) and waste (same usage =
    more cost). NEVER recommend reducing capabilities to save money.
  - The $10/day circuit breaker is per account. You MUST monitor total
    spend across ALL accounts, not just individual accounts.
  - Haiku costs are negligible (~$0.001/call). You MUST NOT waste time
    optimizing Haiku usage. Focus ALL optimization recommendations on
    Sonnet and Opus usage.
  - Conversation mode is the biggest variable cost. 10+ turn conversations
    costing $1-2 are acceptable IF productive. You MUST NOT flag productive
    conversations as cost issues. Only flag conversations that appear stuck
    or repetitive.
  - During E2E testing, costs WILL be higher than production steady-state.
    You MUST note this context when flagging anomalies during testing periods.
    NEVER trigger a CRITICAL alert for testing-related spend unless it
    exceeds $50/day.

schedule: null
chain_after: null
requires_approval: false
min_clearance: internal
