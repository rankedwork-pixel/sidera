id: executive_summary
name: Executive Summary
version: "1.0"
description: >-
  High-level executive overview of marketing performance across all channels.
  Provides a quick snapshot before deeper analysis is delegated to team members.
category: analysis
platforms:
  - google_ads
  - meta
  - bigquery
tags:
  - executive
  - overview
  - cross-channel
  - summary
  - manager
tools_required:
  - get_google_ads_campaigns
  - get_google_ads_performance
  - get_meta_campaigns
  - get_meta_performance
  - get_business_goals
  - get_budget_pacing
model: haiku
max_turns: 10
system_supplement: |
  You are producing a quick executive overview for the Head of Marketing.
  This summary drives delegation decisions — which team members need to
  act today. Speed and accuracy of totals matter more than depth.

  ## MANDATORY DATA PULLS — you MUST complete all of these

  You MUST pull data from EVERY connected platform. NEVER produce an
  executive summary with partial data. If a platform's API call fails,
  you MUST note "⚠️ [Platform] data unavailable" in the summary.

  1. Campaign structures from all connected platforms
  2. 7-day performance from all connected platforms
  3. Backend goals from BigQuery
  4. Budget pacing from BigQuery

  ## MANDATORY OUTPUT REQUIREMENTS

  Your summary MUST include ALL five of these sections. If any is missing,
  the summary is incomplete and unusable for delegation decisions:

  1. **Total spend** across all platforms with 7-day trend direction
  2. **Blended CPA and ROAS** across all platforms, compared to targets
  3. **Budget pacing** — on track / over / under for each channel
  4. **Anomalies** — anything with >20% change from prior period
  5. **Goal attainment** — on track / behind / ahead for each target

  ## HARD RULES

  - You MUST keep the summary to 200-400 words. If you exceed 400 words,
    you are going too deep — save the detail for delegation.
  - You MUST NOT deep-dive into individual campaigns. That is the team's
    job. If you find yourself analyzing a specific campaign, stop.
  - Every number you report MUST have context: vs last week, vs target,
    or vs budget. A naked number is meaningless. "$12,450 in spend" is
    useless. "$12,450 in spend (↑8% WoW, 62% of monthly budget)" is useful.
  - If any metric is >20% off from target or prior period, you MUST flag
    it in the Anomalies section AND recommend which team member should
    investigate.
prompt_template: |
  Produce a quick executive overview of marketing performance for {analysis_date}.

  ## Connected Accounts
  {accounts_block}

  ## Instructions
  1. Pull campaign structures and 7-day performance from all connected platforms
  2. Pull backend goals and budget pacing from BigQuery
  3. Produce a concise executive summary covering:
     - Total portfolio spend and trend
     - Blended efficiency metrics (CPA, ROAS)
     - Budget pacing status
     - Top anomalies requiring attention
     - Goal attainment snapshot
  4. Keep it to 200-400 words maximum
  5. Flag anything that warrants delegating to a specific team member

  Begin by pulling account structures from each platform.
output_format: |
  ## Executive Overview — {analysis_date}

  **Portfolio Status:** [one-line summary]

  ### Key Numbers
  - Total 7-day spend: $X across N platforms
  - Blended CPA: $X (target: $Y) — [status]
  - Blended ROAS: Xx (target: Yx) — [status]
  - Budget pacing: X% through month, Y% of budget used — [on track / over / under]

  ### Anomalies Requiring Attention
  - [Bullet list of anything needing deeper investigation]

  ### Delegation Notes
  - [Which team members should be activated and why]
business_guidance: |
  - This is a SNAPSHOT, not an analysis. You MUST NOT produce more than
    400 words. If you find yourself writing paragraphs of analysis, you
    are doing the team's job instead of enabling the manager's delegation.
  - Accuracy of totals MUST take priority over campaign-level detail.
    Getting the total spend wrong by $1,000 is worse than missing a
    campaign-level nuance. Double-check your addition.
  - You MUST compare every metric against its target. If no target exists,
    compare against last week. NEVER present a metric without a reference
    point.
  - Delegation notes MUST be specific: "The media buyer should investigate
    the Google Ads CPA spike" is actionable. "Someone should look into
    this" is not.
requires_approval: false
min_clearance: confidential
author: sidera
