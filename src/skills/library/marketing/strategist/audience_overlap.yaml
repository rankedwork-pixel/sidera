id: audience_overlap
name: Cross-Platform Audience Overlap Analysis
version: "1.0"
description: Identify where Google Ads and Meta campaigns target overlapping audiences, quantify cannibalization, and recommend de-duplication strategies
category: audience
platforms: [google_ads, meta, bigquery]
tags: [audience, overlap, cannibalization, cross-platform, deduplication, targeting, google, meta, frequency, reach]

tools_required:
  - get_google_ads_campaigns
  - get_google_ads_performance
  - get_meta_campaigns
  - get_meta_performance
  - get_meta_audience_insights
  - get_backend_performance
  - get_campaign_attribution
  - create_google_doc
  - update_google_ads_campaign
  - update_meta_campaign

model: sonnet
max_turns: 15

system_supplement: |
  For this analysis you are focused on identifying and quantifying audience
  overlap between Google Ads and Meta campaigns. Your goal is to find where
  the advertiser is paying twice to reach the same users, measure the
  financial impact of that cannibalization, and recommend concrete
  de-duplication strategies.

  ## Audience Overlap Analysis Framework
  1. Pull targeting parameters from all active campaigns on both platforms:
     - Google Ads: audiences (in-market, affinity, custom, remarketing),
       demographics, geographic targeting, device targeting, keyword themes
     - Meta: custom audiences, lookalike audiences, interest targeting,
       demographic targeting, geographic targeting, placement settings
  2. Map targeting overlaps at the parameter level:
     - Same remarketing lists used on both platforms
     - In-market audiences on Google that correspond to interest targets on Meta
     - Lookalike audiences on Meta that likely overlap with Google's
       similar audiences or in-market segments
     - Geographic and demographic overlap (same age, gender, location)
  3. Use BigQuery backend attribution data to identify actual user overlap:
     - Users who converted and had touchpoints on both Google and Meta
     - Conversion paths where both platforms claim credit
     - Time-to-conversion differences between platforms for overlapping users
  4. Calculate the attribution conflict rate:
     - Sum of platform-reported conversions vs backend conversions
     - The gap represents double-counting (both platforms claiming the
       same conversion)
     - Express as: "For every 100 backend conversions, Google claims X
       and Meta claims Y, totaling X+Y claimed — an inflation ratio of Z"
  5. Estimate the financial cost of overlap:
     - Identify campaigns where both platforms served ads to the same user
       before conversion (multi-touch paths in backend data)
     - Calculate incremental value: what conversions would be lost if one
       platform's campaign was turned off?
     - The non-incremental spend is the cannibalization cost
  6. Develop de-duplication recommendations:
     - Audience exclusions (e.g., exclude Meta remarketing audiences from
       Google Display, or vice versa)
     - Platform specialization (assign specific funnel stages to each
       platform: Google for intent, Meta for awareness)
     - Frequency management: cross-platform frequency estimates and caps
     - Sequential messaging: use platform strengths in sequence rather than
       simultaneously targeting the same users with the same message

prompt_template: |
  Run a cross-platform audience overlap analysis.
  Analysis date: {analysis_date}

  Connected Accounts:
  {accounts_block}

  Analyze the last {lookback_days} days of campaign targeting, performance,
  and backend attribution data. Identify where Google Ads and Meta campaigns
  are targeting overlapping audiences, quantify the financial impact of
  cannibalization, and recommend de-duplication strategies.

  Focus on:
  - Targeting parameter overlap between platforms
  - Backend conversion path data showing multi-platform touchpoints
  - Attribution inflation (both platforms claiming the same conversions)
  - Incremental value estimation per platform

  Create a Google Doc with the full analysis and recommendations.

output_format: |
  ## Executive Summary
  2-3 sentences: What is the estimated overlap rate? How much spend is
  potentially cannibalized? What is the top recommendation?

  ## Overlap Indicators
  Table: Google Campaign | Meta Campaign | Overlap Type (targeting /
  conversion path / both) | Overlap Confidence (High / Medium / Low) |
  Combined Spend | Estimated Overlap Spend

  Sort by estimated overlap spend descending.

  ## Attribution Conflict Analysis
  - Total backend conversions in the period
  - Total Google-claimed conversions
  - Total Meta-claimed conversions
  - Sum of claimed vs actual (inflation ratio)
  - Breakdown by campaign pair showing which pairs have the highest
    double-counting rates
  - Time-lag analysis: which platform typically touches the user first
    vs last in overlapping conversion paths

  ## De-duplication Recommendations
  For each recommendation:
  - Strategy description (audience exclusion, platform specialization,
    frequency cap, sequential messaging)
  - Specific campaigns and targeting changes to implement
  - Expected reduction in wasted overlap spend
  - Expected impact on overall conversions (should be neutral or positive)
  - Implementation complexity (easy / moderate / complex)
  - Recommended test approach (holdout geography, time-based A/B, etc.)

  ## Incrementality Estimates
  For each platform and major campaign:
  - Estimated incremental conversion rate (what % of conversions would
    not have happened without this campaign)
  - Confidence level in the estimate
  - Recommended holdout test to validate the estimate

  ## Deliverables Created
  - Google Doc: [link] — full overlap analysis with recommendations

business_guidance: |
  - Backend attribution data from BigQuery is the source of truth for
    overlap detection. Platform-reported audience overlap estimates are
    directional indicators only and should not be used for financial
    calculations.
  - Do not recommend eliminating all audience overlap — some overlap is
    healthy and reinforces messaging across touchpoints. Focus on overlap
    that is clearly unprofitable: cases where the combined CPA of
    overlapping campaigns exceeds the target, or where one platform is
    providing near-zero incremental value.
  - Recommend A/B holdout tests before making major audience exclusion
    changes. The risk of over-excluding is losing reach to valuable users.
    Holdout tests (pause one platform in a test geography for 2-4 weeks)
    provide the most reliable incrementality data.
  - Be cautious about recommending remarketing exclusions across platforms.
    Remarketing audiences are high-value, and showing ads on both platforms
    may increase conversion probability even if it looks like duplication.
    Look at backend time-to-conversion for remarketing overlap specifically.
  - When estimating incrementality, use conservative assumptions. In the
    absence of holdout test data, assume that at least 40% of overlapping
    conversions are incremental (the user may have needed both touchpoints).
  - Attribution inflation ratios above 1.3x (platforms collectively claim
    30%+ more conversions than backend shows) are common and expected.
    Ratios above 1.6x suggest significant overlap that warrants action.
  - Consider funnel position when evaluating overlap: top-of-funnel overlap
    (Google Display + Meta prospecting) is more wasteful than bottom-of-funnel
    overlap (Google Search + Meta remarketing), which may reflect natural
    multi-touch behavior.
  - Seasonal and promotional periods naturally increase overlap as both
    platforms ramp spend. Analyze overlap during steady-state periods for
    the most actionable insights.

