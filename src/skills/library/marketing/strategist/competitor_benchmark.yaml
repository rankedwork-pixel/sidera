id: competitor_benchmark
name: Competitor Benchmark Report
version: "1.0"
description: Compare campaign CPAs and ROAS against industry vertical averages from BigQuery benchmark data to identify where performance leads or lags the market
category: reporting
platforms: [google_ads, meta, bigquery]
tags: [competitor, benchmark, industry, comparison, vertical, average, percentile, market, competitive, performance-gap, industry-standard]

tools_required:
  - get_backend_performance
  - get_business_goals
  - get_google_ads_performance
  - get_google_ads_campaigns
  - get_meta_performance
  - get_meta_campaigns
  - get_campaign_attribution
  - create_google_doc
  - manage_google_sheets

model: sonnet
max_turns: 15

system_supplement: |
  You are generating a competitor benchmark report comparing the advertiser's
  performance against industry vertical averages. The output MUST inform
  budget and optimization decisions with competitive context.

  ## MANDATORY ANALYSIS SEQUENCE — complete every step

  **STEP 1: ADVERTISER DATA**
  You MUST pull the advertiser's performance metrics from ALL connected
  platforms: cost, conversions, revenue, impressions, clicks, CPA, ROAS,
  CTR, CVR at the campaign level. NEVER produce a benchmark report with
  incomplete advertiser data. If a platform fails, state it explicitly.

  **STEP 2: BENCHMARK DATA**
  You MUST query BigQuery for industry vertical benchmark data. Look for
  tables with benchmark averages by vertical AND campaign type. If
  benchmark data is unavailable for the exact vertical, you MUST use the
  closest available AND explicitly state: "Using [X] benchmarks as proxy
  for [Y] — actual vertical benchmarks unavailable." NEVER silently use
  a proxy vertical.

  **STEP 3: CAMPAIGN TYPE SEGMENTATION (NON-NEGOTIABLE)**
  You MUST segment ALL comparisons by campaign type. Search benchmarks
  are fundamentally different from display or social. You MUST NEVER
  compare search metrics against display benchmarks — doing so produces
  completely wrong conclusions. A search CTR of 5% is normal; a display
  CTR of 5% would be extraordinary. If you catch yourself comparing
  across types, stop and fix it.

  **STEP 4: METRIC CALCULATION**
  For each metric × campaign type, you MUST calculate ALL of:
  - Advertiser value vs industry average (absolute difference)
  - Advertiser value vs industry median (absolute difference)
  - Percentile ranking (where distribution data exists)
  - Trend direction (gap widening or narrowing?)
  NEVER omit any of these. If data is unavailable for one, say so.

  **STEP 5: CLASSIFICATION (HARD THRESHOLDS)**
  You MUST classify each metric into exactly one bucket:
  - **Competitive advantage:** outperforms median by >10%
  - **Competitive parity:** within ±10% of median
  - **Competitive gap:** underperforms median by >10%
  NEVER use subjective classification. The 10% threshold IS the rule.

  **STEP 6: ROOT CAUSES AND ACTIONS**
  For each competitive gap, you MUST provide a specific hypothesis
  and actionable next step. For each advantage, you MUST assess
  sustainability risk. NEVER leave a gap without a recommendation.

  **STEP 7: DELIVERABLES**
  You MUST create:
  - Google Doc with full narrative analysis
  - Google Sheets with raw comparison data
  NEVER skip either deliverable.

  ## WRITING RULES
  - Tables for comparisons, prose for interpretation. NEVER reverse this.
  - Be honest about benchmark limitations. Benchmarks are aggregated
    across advertisers with different business models. NEVER present
    benchmarks as precise targets.
  - Avoid false precision — a 2% difference from median is noise, not
    signal. Only flag differences >10%.

prompt_template: |
  Generate a competitor benchmark report.
  Analysis date: {analysis_date}

  Connected Accounts:
  {accounts_block}

  Compare the last {lookback_days} days of performance data against
  industry benchmarks available in BigQuery. Segment the analysis by
  campaign type (search, shopping, display, social) and compare CPA,
  ROAS, CTR, and CVR against vertical averages.

  Create a Google Doc with the narrative analysis and a Google Sheets
  workbook with the raw benchmark comparison data.

  {extra_instructions}

output_format: |
  ## Executive Summary
  2-3 sentences: overall competitive position. Are we leaders, laggards,
  or mixed? What is the single biggest opportunity based on benchmarks?

  ## Benchmark Comparison Table
  For each campaign type:
  Table: Metric | Your Value | Industry Avg | Industry Median |
  Your Percentile | Status (Leading / Parity / Lagging)

  ## Competitive Advantages
  Where the advertiser outperforms the market. For each advantage:
  - Which metric, which campaign type, by how much
  - Why — what is the advertiser doing that drives this edge
  - Is it sustainable? Any risks to the advantage eroding?

  ## Competitive Gaps
  Where the advertiser trails the market. For each gap:
  - Which metric, which campaign type, by how much
  - Hypothesis for the root cause
  - Recommended action to close the gap with estimated impact

  ## Platform-Specific Breakdown
  Separate sections for Google Ads and Meta showing how each platform's
  campaigns compare to their respective benchmarks.

  ## Trend vs Benchmarks
  Are the gaps widening or narrowing over time? Show directional trend
  for the most important metrics over the last 3-4 periods if data allows.

  ## Caveats and Methodology Notes
  - Data sources and time periods for benchmarks
  - Sample sizes and confidence levels where available
  - Known limitations (vertical approximation, platform-reported vs backend, etc.)

  ## Deliverables Created
  - Google Doc: [link]
  - Google Sheets: [link]

business_guidance: |
  ## HARD RULES — violating these produces misleading analysis

  - Benchmarks are directional, NOT targets. You MUST NOT present them
    as gospel. Every benchmark comparison MUST include: "Benchmarks
    reflect aggregated data across advertisers with different business
    models, margins, and conversion definitions."
  - You MUST cite the data source AND time period for ALL benchmark data.
    If benchmark data is >90 days old, you MUST flag it as potentially
    stale: "⚠️ Benchmark data from [date] — may not reflect current
    market conditions."
  - If BigQuery lacks exact-vertical benchmarks, you MUST use the closest
    vertical AND MUST explicitly note the approximation. NEVER silently
    substitute.
  - You MUST NEVER compare cross-type (search vs display vs social).
    This is the #1 source of wrong benchmark conclusions.
  - Backend-attributed metrics are the advertiser's truth. Industry
    benchmarks are typically platform-reported. You MUST note this:
    "Your backend CPA is $X vs industry average platform-reported CPA
    of $Y — the gap may be smaller after adjusting for attribution."
    NEVER compare backend metrics to platform benchmarks without this
    caveat.
  - Prioritize by business impact: a 30% CPA gap matters more than a
    5% CTR gap. You MUST rank gaps by estimated dollar impact, not
    percentage difference.
  - If the advertiser is in the top quartile on a metric, you MUST NOT
    recommend further optimization. Diminishing returns apply. State:
    "Top quartile — maintain current approach, focus optimization
    elsewhere."
  - File naming: "Benchmark Report — YYYY-MM-DD" for docs, "Benchmark
    Data — YYYY-MM-DD" for sheets. Follow this exactly.
  - You MUST NOT overwrite previous reports. Historical benchmarks enable
    trend analysis. Destroying them removes that capability.

