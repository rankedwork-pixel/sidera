id: weekly_report
name: Weekly Performance Report
version: "1.0"
description: Generate a comprehensive weekly performance report across all platforms with Google Doc report, Sheets data export, and optional Slides deck
category: reporting
platforms: [google_ads, meta, bigquery, google_drive]
tags: [weekly, report, summary, performance, document, spreadsheet, presentation, overview]

tools_required:
  - get_google_ads_campaigns
  - get_google_ads_performance
  - get_meta_campaigns
  - get_meta_performance
  - get_backend_performance
  - get_campaign_attribution
  - get_budget_pacing
  - get_business_goals
  - create_google_doc
  - manage_google_sheets
  - manage_google_slides
  - search_google_drive
  - manage_drive_folders

model: sonnet
max_turns: 25

system_supplement: |
  You are generating a comprehensive weekly performance report. The output
  MUST be publication-ready — a marketing manager shares this with
  stakeholders without editing. If it needs editing, you failed.

  ## MANDATORY ANALYSIS SEQUENCE — complete every step

  **STEP 1: DATA COLLECTION**
  You MUST pull BOTH 7-day AND 30-day performance data from ALL connected
  platforms. NEVER produce a weekly report with data from only one platform.
  If a platform API call fails, you MUST note "⚠️ [Platform] data
  unavailable — report is incomplete" at the top of the report.

  **STEP 2: BACKEND CROSS-REFERENCE (NON-NEGOTIABLE)**
  You MUST cross-reference ALL platform data with BigQuery backend for
  real conversion numbers. NEVER present platform-reported conversions
  without the backend comparison. If backend data is unavailable, you MUST
  clearly mark every affected section as "Platform-reported only —
  backend verification unavailable."

  **STEP 3: WEEK-OVER-WEEK CALCULATION**
  You MUST calculate WoW changes for ALL key metrics: spend, CPA, ROAS,
  CTR, CVR, conversion volume. NEVER present a metric without its WoW
  change. A number without context is meaningless.

  **STEP 4: WINS AND CONCERNS**
  You MUST identify exactly 3 wins and exactly 3 concerns. Not 2, not 5.
  Three of each. Each MUST include: the metric, the magnitude of change,
  and why it matters for the business.

  **STEP 5: GOAL ATTAINMENT**
  You MUST check every active goal and classify: on track / at risk /
  off track. NEVER skip goal attainment — it's the section stakeholders
  read first.

  **STEP 6: DELIVERABLE CREATION**
  You MUST create:
  a. Google Doc — narrative report with analysis (ALWAYS)
  b. Google Sheets — raw data export with pivot-ready tables (ALWAYS)
  c. Google Slides — only if explicitly requested
  You MUST organize all files in a "Weekly Reports" folder on Drive.

  ## WRITING RULES — non-negotiable

  - Lead with insights, NEVER with data dumps. The first paragraph MUST
    be an insight, not a number.
  - EVERY number MUST have context: vs last week, vs target, or vs
    30-day average. Naked numbers are banned.
  - Use tables for comparisons, prose for interpretation. NEVER put
    analysis in a table or raw data in prose.
  - Bold key takeaways. If a stakeholder skims only the bold text, they
    should understand the story.

prompt_template: |
  Generate the weekly performance report.
  Report period: 7 days ending {analysis_date}

  Connected Accounts:
  {accounts_block}

  Create the following deliverables:
  1. Google Doc with the full narrative report
  2. Google Sheets with raw performance data
  {extra_instructions}

  Organize all files in a "Weekly Reports" folder on Google Drive.

output_format: |
  ## Report Summary
  Brief summary of what was generated and links to all deliverables.

  ## Key Highlights
  - Top 3 wins this week
  - Top 3 concerns this week
  - Goal attainment status (on track / at risk / off track)

  ## Deliverables Created
  - Google Doc: [link]
  - Google Sheets: [link]
  - Google Slides: [link] (if created)
  - Folder: [link]

  ## Next Week Outlook
  What to watch for in the coming week based on current trends.

business_guidance: |
  ## HARD RULES

  - You MUST compare this week vs last week AND vs 4-week average for
    every key metric. Single-week comparisons miss trends. 4-week average
    without WoW misses volatility. You need both.
  - You MUST include platform-reported AND backend-verified numbers side
    by side for every conversion metric. The delta between them IS the
    insight — platforms overreport. Show the inflation ratio.
  - You MUST highlight any metric that moved >15% WoW. Use bold + a
    directional indicator (↑/↓). If nothing moved >15%, explicitly state
    "No significant WoW changes (all metrics within ±15%)."
  - You MUST use the advertiser's target ROAS and target CPA as
    benchmarks. If targets are not available in BigQuery, state
    "Targets unavailable — using 4-week average as proxy" and flag this
    as a gap for the steward to fix.
  - File naming: "Weekly Report — YYYY-MM-DD" for docs,
    "Weekly Data — YYYY-MM-DD" for sheets. You MUST follow this exactly.
  - You MUST NOT overwrite previous reports. ALWAYS create new files.
    Historical reports are an audit trail — destroying them is
    unacceptable.
  - If backend data is unavailable, you MUST mark affected sections with
    "⚠️ Platform-reported only" and explain the limitation.

schedule: "0 9 * * MON"
chain_after: null
requires_approval: false
min_clearance: internal
