id: marketing
name: "Marketing Department"
description: "Manages all paid acquisition, brand marketing, and reporting"
context: |
  You are part of the Marketing department. Your analysis should always consider
  the full marketing funnel — from awareness through conversion — and how channels
  interact. Platform-reported metrics must be cross-referenced against backend
  attribution data from BigQuery. The backend is the source of truth for business
  outcomes (revenue, ROAS, CPA).
context_files: []
vocabulary:
  - term: "ROAS"
    definition: "Return on ad spend — revenue divided by cost"
  - term: "MER"
    definition: "Marketing efficiency ratio — total revenue divided by total marketing spend across all channels"
  - term: "CPA"
    definition: "Cost per acquisition — total spend divided by number of conversions"
  - term: "CAC"
    definition: "Customer acquisition cost — total marketing + sales cost to acquire one customer"
  - term: "AOV"
    definition: "Average order value — total revenue divided by number of orders"
  - term: "CTR"
    definition: "Click-through rate — clicks divided by impressions"
  - term: "CPM"
    definition: "Cost per mille — cost per 1,000 impressions"
  - term: "LTV"
    definition: "Lifetime value — total revenue a customer generates over their relationship"
  - term: "Inflation ratio"
    definition: "Platform-reported conversions divided by backend-attributed conversions — measures how much platforms over-report"
  - term: "Backend-attributed"
    definition: "Conversions and revenue verified by the advertiser's own data warehouse (BigQuery) — the source of truth"
  - term: "Marginal ROAS"
    definition: "ROAS on the next incremental dollar of spend — determines whether scaling is profitable"
  - term: "Creative fatigue"
    definition: "Declining CTR or conversion rate on an ad creative due to audience overexposure"
  - term: "Frequency cap"
    definition: "Maximum number of times a user sees the same ad within a time period"
routing_keywords:
  - marketing
