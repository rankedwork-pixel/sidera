id: fb_creative_cuts
name: FB Creative Cuts (Code-Backed)
version: "1.0"
description: >-
  Executes calibrated Python analysis to identify underperforming Meta ad
  creatives that should be cut or watched. Uses on-platform CPBC, CPL
  fallback, and cross-ad-set pattern detection. Produces CSV scorecard
  and Word doc matching the daily standup format.
category: creative
platforms: [meta]
tags:
  - creative
  - meta
  - facebook
  - cuts
  - performance
  - cpbc
  - cpl
  - ad-creative
  - code-backed
  - standup

# --- Code-backed execution ---
skill_type: code_backed
code_entrypoint: code/run.py
code_timeout_seconds: 120
code_output_patterns:
  - "output/*.csv"
  - "output/*.docx"

tools_required:
  - run_skill_code
  - send_slack_alert
  - create_google_doc
  - edit_google_doc
  - manage_google_sheets

model: sonnet
max_turns: 5

context_files:
  - "context/*.md"

system_supplement: |
  You are executing a **code-backed skill**. The Python code does the
  analysis — your job is to run it, read the output, and present the
  findings. You MUST NOT re-analyze the data yourself.

  ## HOW THIS SKILL WORKS — understand before executing

  The Python code in code/run.py is a calibrated two-step pipeline:
  1. **creative_cuts.py** — Loads CSV export, classifies ads by ad set
     (State + Gender + Language), computes CPBC and CPL, applies
     calibrated thresholds, outputs CSV scorecard (CUT/WATCH/N/C).
  2. **generate_cuts_doc.py** — Takes CSV output, generates Word doc
     matching the daily standup briefing format.

  ## CALIBRATED THRESHOLDS — these are non-negotiable

  These thresholds were calibrated against real human cut decisions.
  You MUST NOT override, adjust, or second-guess them:
  - Primary metric: On-Platform CPBC (cost per backend conversion)
  - CUT: 50% above ad set average CPBC
  - WATCH: 20% above ad set average CPBC
  - CPL Shield: Ads in top 20% CPL are protected from CPBC-only cuts
  - Minimum 14 days in market before evaluation
  - Max 3 CUT + 3 WATCH per ad set
  - Cross-ad-set flag: creative bad in 3+ ad sets → flag globally

  ## MANDATORY WORKFLOW — follow this exact sequence

  1. **FIRST:** Call run_skill_code to execute the analysis. You MUST
     NOT attempt to run the analysis logic yourself. The code IS the
     analysis. Your job is presentation, not computation.

  2. **SECOND:** Read the output CSV. You MUST report the exact numbers
     from the CSV. NEVER paraphrase or round the metrics — use the
     precise values the code produced.

  3. **THIRD:** Summarize findings: total CUTs, total WATCHes, which
     ad sets have the most cuts, any cross-ad-set patterns.

  4. **FOURTH:** If requested, push to Google Sheets or create a
     Google Doc. Only if explicitly requested.

  5. **FIFTH:** Present findings in Slack-ready format. Lead with the
     cut list — that's what matters most for the daily standup.

  ## HARD RULES

  - You MUST NOT second-guess the code's recommendations. The code was
    calibrated against real human decisions — trust it.
  - You MUST show actual CPBC and CPL numbers, not just "above average."
    The numbers are the evidence.
  - If the code fails or produces empty output, you MUST report the
    error clearly and suggest checking the input CSV in data/.
    NEVER fabricate results when the code fails.
  - Cross-ad-set flags are HIGH PRIORITY — these creatives are
    underperforming everywhere. Always present them first.

prompt_template: |
  Run the FB Creative Cuts analysis using the run_skill_code tool.
  After execution completes, read the output CSV and Word doc results.

  Summarize the key findings:
  - How many ads were flagged for CUT vs WATCH
  - Which ad sets have the most cuts
  - Any cross-ad-set patterns (same creative bad everywhere)
  - Estimated weekly waste from recommended cuts

  Present the findings in a format ready for a Slack daily briefing.
  Keep it concise and actionable — lead with the cut list.

output_format: |
  ## Creative Cuts Summary
  Quick stats: X cuts, Y watches across Z ad sets.

  ## Cut List
  - Ad Set: [name]
    - CUT: [creative names] — [reason with metrics]

  ## Watch List
  - Ad Set: [name]
    - WATCH: [creative names] — [reason with metrics]

  ## Cross-Ad-Set Flags
  Creatives flagged as globally underperforming.

  ## Estimated Impact
  Weekly waste reduction from recommended cuts.

business_guidance: |
  - The Python code is calibrated against real human cut decisions. You
    MUST trust it. If you disagree with a recommendation, present the
    code's recommendation anyway and note your disagreement separately.
    The code's output is the primary deliverable, not your opinion.
  - You MUST focus on presentation clarity, NOT re-analysis. Your value
    is in formatting, summarizing, and highlighting — not in recalculating
    what the code already calculated. If you find yourself doing math,
    you are doing it wrong.
  - You MUST show actual CPBC and CPL numbers with the recommendation.
    "Cut Creative X" is incomplete. "Cut Creative X — CPBC $47.20 vs
    ad set avg $28.50 (66% above), 21 days in market" is actionable.
  - If the code fails, you MUST NOT fabricate or estimate results. Report:
    "Code execution failed: [error]. Check input CSV at data/[filename]."
  - Cross-ad-set flags MUST appear first in your output, before per-ad-set
    results. A creative failing in 3+ ad sets is a portfolio-level problem,
    not an ad-set-level problem.

schedule: null
chain_after: null
requires_approval: false
min_clearance: internal
