# Auto-execute rules for Performance Media Buyer
#
# These rules define which actions the agent can execute automatically
# without human approval.  Each rule specifies:
#   - action_types: Which action types it applies to
#   - conditions: All conditions must pass (AND logic)
#   - constraints: Daily limits, cooldowns, platform restrictions
#
# Rules are evaluated in order — first match wins.
# If no rule matches, the action goes to manual approval.
#
# IMPORTANT: The global setting `auto_execute_enabled` must be True
# for any auto-execution to happen.  It defaults to False.

role_id: performance_media_buyer

rules:
  - id: pause_low_roas_ads
    description: "Auto-pause ads with ROAS < 0.5x and daily spend > $100"
    enabled: true
    action_types:
      - pause_campaign
      - update_ad_status
    conditions:
      - field: "action_params.metrics.roas"
        operator: "lt"
        value: 0.5
      - field: "action_params.metrics.daily_spend"
        operator: "gt"
        value: 100.0
    constraints:
      max_daily_auto_executions: 5
      cooldown_minutes: 60
      platforms:
        - google_ads
        - meta

  - id: pause_high_cpa_ads
    description: "Auto-pause ads with CPA > 3x target"
    enabled: true
    action_types:
      - pause_campaign
      - update_ad_status
    conditions:
      - field: "action_params.metrics.cpa_vs_target_ratio"
        operator: "gt"
        value: 3.0
      - field: "action_params.metrics.daily_spend"
        operator: "gt"
        value: 50.0
    constraints:
      max_daily_auto_executions: 3
      cooldown_minutes: 120
      platforms:
        - google_ads
        - meta

  - id: add_obvious_negatives
    description: "Auto-add negative keywords with 0 conversions and $200+ spend"
    enabled: true
    action_types:
      - add_negative_keywords
    conditions:
      - field: "action_params.metrics.conversions"
        operator: "eq"
        value: 0
      - field: "action_params.metrics.spend"
        operator: "gt"
        value: 200.0
    constraints:
      max_daily_auto_executions: 10
      cooldown_minutes: 30
      platforms:
        - google_ads

  - id: small_budget_increase
    description: "Auto-increase budget by up to 15% for campaigns with strong ROAS"
    enabled: false  # Disabled by default — enable when comfortable
    action_types:
      - budget_change
    conditions:
      - field: "action_params.metrics.roas"
        operator: "gt"
        value: 3.0
      - field: "action_params.budget_change_pct"
        operator: "lte"
        value: 15.0
    constraints:
      max_daily_auto_executions: 2
      cooldown_minutes: 240
      platforms:
        - google_ads
        - meta
