id: geo_performance
name: Geographic Performance Analysis
version: "1.0"
description: Break down campaign performance by geographic region across Google Ads and Meta, identify top and bottom performing geos, and recommend geo-level bid adjustments
category: optimization
platforms: [google_ads, meta, bigquery]
tags: [geo, geographic, location, region, state, city, dma, geo-targeting, local, area, geo-bid-adjustment, location-performance]

tools_required:
  - get_google_ads_performance
  - get_google_ads_campaigns
  - get_meta_performance
  - get_meta_campaigns
  - get_backend_performance
  - get_campaign_attribution
  - create_google_doc
  - manage_google_sheets
  - update_google_ads_campaign

model: sonnet
max_turns: 15

system_supplement: |
  For this analysis you are focused on geographic performance patterns —
  identifying which regions, states, and metro areas deliver the best
  and worst return on ad spend, and recommending geo-level targeting
  and bid adjustments to shift spend toward high-performing locations.

  ## Geographic Performance Analysis Framework
  1. Pull geo-segmented performance data from Google Ads at the most
     granular level available: state/region, metro area (DMA), and city
     where data volume supports it. Google Ads provides location
     segmentation in performance reports.
  2. Pull geo-segmented performance data from Meta using geographic
     breakdowns (country, region). Meta supports region-level reporting
     but not DMA-level — work with the granularity available.
  3. Cross-reference with BigQuery backend data for true conversion
     attribution by geography. Platform-reported geo attribution may
     differ from backend because:
     - Google attributes to the user's physical location or location
       of interest; backend attributes to shipping/billing address.
     - Meta may attribute to IP-based location which can be inaccurate.
     If backend data includes customer geography (state, zip, DMA),
     use it as the source of truth for geo-level efficiency metrics.
  4. For each geography, calculate:
     - Total spend and share of total account spend
     - Backend conversions and backend CPA
     - Backend ROAS (revenue / spend)
     - CPA and ROAS indexed to account average (100 = account average)
     - Click-through rate and conversion rate
     - Cost per click (CPC varies significantly by geography due to
       competition density)
  5. Rank all geographies by backend ROAS descending. Identify:
     - **Top 10 geos**: highest backend ROAS with meaningful spend
       (>2% of account spend). These are candidates for bid increases.
     - **Bottom 10 geos**: lowest backend ROAS with meaningful spend.
       These are candidates for bid reductions or exclusion.
     - **Hidden gems**: geos with strong ROAS but very low spend share
       (<1%) — potential to scale if bid adjustments open up volume.
     - **Money pits**: geos consuming >5% of spend with ROAS
       significantly below target. Immediate attention required.
  6. Compare geo performance across platforms. If Texas performs well
     on Google Ads but poorly on Meta, that is a meaningful signal —
     the platforms may be reaching different audience segments in that
     region, or the competitive dynamics differ by platform.
  7. Check for geographic concentration risk: if >40% of backend
     conversions come from a single state or metro area, the account
     is over-exposed to regional economic fluctuations. Flag this and
     recommend diversification strategies.
  8. For Google Ads, map the analysis to specific bid adjustment
     recommendations (Google supports geo bid adjustments at state,
     metro, and city levels). For Meta, recommend geographic targeting
     changes or geo-specific campaign structures.
  9. Consider population-adjusted metrics: a state with 3x the
     population should generate roughly 3x the volume. If a large
     state is significantly underperforming its population share,
     that signals a targeting or competitive problem worth investigating.

prompt_template: |
  Run a geographic performance analysis across all connected ad platforms.
  Analysis date: {analysis_date}

  Connected Accounts:
  {accounts_block}

  Pull the last {lookback_days} days of performance data segmented by
  geographic region from Google Ads and Meta. Cross-reference with
  BigQuery backend data for true geo-level conversion attribution.

  Identify the top and bottom performing geographies, compare patterns
  across platforms, and recommend specific geo bid adjustments for
  Google Ads and targeting changes for Meta. Export the full geo
  performance data to a Google Sheets spreadsheet for the advertiser's
  reference.

  {extra_instructions}

output_format: |
  ## Executive Summary
  2-3 sentences: Are there significant geographic performance disparities?
  How much efficiency could be gained through geo-level optimization?
  Is the account over-concentrated in specific regions?

  ## Geo Performance Table
  Table with columns: Region/State | Platform | Spend | Spend Share |
  Backend Conversions | Backend CPA | Backend ROAS | CPA Index (vs Avg) |
  ROAS Index (vs Avg) | Recommendation
  Sort by spend descending. Include all geographies with >1% spend share.

  ## Top 10 Geographies (Scale Opportunities)
  For each top-performing geo:
  - Region name and platforms where it excels
  - Backend CPA and ROAS with comparison to account average
  - Current spend share vs potential (is it underfunded?)
  - Recommended bid adjustment (Google Ads) or targeting emphasis (Meta)
  - Estimated additional conversions if scaled

  ## Bottom 10 Geographies (Efficiency Drains)
  For each underperforming geo:
  - Region name and platforms where it underperforms
  - Backend CPA and ROAS with comparison to account average
  - Current spend being wasted (spend at above-target CPA)
  - Recommended action: bid reduction percentage, exclusion, or monitor
  - Estimated savings if adjusted

  ## Cross-Platform Geo Comparison
  Geographies where the two platforms diverge significantly:
  - Region name
  - Google Ads backend CPA vs Meta backend CPA
  - Possible explanations (audience composition, competition, format)
  - Recommended platform-specific strategies

  ## Concentration Risk Assessment
  - Share of conversions from top 3 geographies
  - Risk level (low / moderate / high)
  - Diversification recommendations if concentrated

  ## Bid Adjustment Recommendations
  Google Ads geo bid adjustments table:
  Region | Current Adjustment | Recommended Adjustment | Rationale
  Meta geographic targeting changes:
  Region | Recommended Action | Rationale

  ## Sheets Export
  Confirmation that full geo performance data has been exported to
  Google Sheets with tabs for: raw data, summary by state, summary
  by DMA (Google Ads only), and cross-platform comparison.

business_guidance: |
  - Require a minimum of 50 backend conversions in a geography before
    making bid adjustment recommendations. Below that threshold, the
    data is too noisy to distinguish signal from randomness.
  - Do not recommend excluding entire states without strong and
    consistent evidence across multiple campaigns over at least 30 days.
    Geographic exclusion is a blunt instrument — prefer bid reductions
    first (e.g., -30%) and monitor for another 14 days before escalating
    to exclusion.
  - Geo bid adjustments should be moderate: ±10% to ±30% for most
    cases. Reserve adjustments beyond ±30% for geographies with very
    clear, high-confidence performance differences (>100 conversions
    and >40% deviation from account average).
  - Consider seasonal and regional patterns before making permanent
    changes. Tourism-heavy regions (Florida, Hawaii, Colorado ski
    towns) have dramatic seasonal swings. College towns see volume
    shifts around academic calendars. Flag any geography where seasonal
    factors may be distorting the lookback window.
  - Compare geographic performance across platforms before recommending
    platform-specific changes. If a region underperforms on both
    platforms, the issue is likely the market itself (competition,
    demand, demographics). If it underperforms on only one platform,
    the issue may be targeting, creative, or bidding on that platform.
  - Population-adjust when interpreting results: California, Texas, and
    Florida have large populations and will naturally have high absolute
    spend. The key metric is efficiency (CPA, ROAS) not absolute volume.
  - For e-commerce advertisers, shipping zones may affect geo-level
    ROAS — customers in regions with higher shipping costs may have
    lower AOV net of shipping. Note this if the data suggests it.
  - When recommending Meta geographic targeting changes, remember that
    Meta's geo targeting is less granular than Google Ads. Recommend
    campaign-level geographic splits (e.g., separate campaigns for
    top states vs rest of country) rather than trying to mirror
    Google's fine-grained bid adjustments.

