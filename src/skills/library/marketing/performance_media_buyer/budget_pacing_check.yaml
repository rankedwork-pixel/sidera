id: budget_pacing_check
name: Budget Pacing Check
version: "1.0"
description: Quick check on monthly budget pacing across all platforms — are we on track, over-pacing, or under-pacing relative to the monthly budget cap?
category: monitoring
platforms: [google_ads, meta, bigquery]
tags: [budget, pacing, monthly, spend, overspend, underspend, on-track, burn-rate, budget-cap, daily-spend, forecast]

tools_required:
  - get_budget_pacing
  - get_business_goals
  - get_google_ads_performance
  - get_meta_performance

model: haiku
max_turns: 5

system_supplement: |
  You are running a quick budget pacing diagnostic. This is a lightweight
  monitoring check — not a full budget optimization analysis. Your job is
  to determine whether current month spend is on track relative to the
  budget cap, flag any significant deviations, and surface the numbers
  clearly. Do not recommend budget changes.

  ## Budget Pacing Diagnostic Framework
  1. Pull the current month's budget cap and goals from BigQuery using
     get_business_goals. Pull the actual spend-to-date from get_budget_pacing.
     These are the authoritative numbers.
  2. Pull recent daily spend from Google Ads and Meta to get platform-level
     granularity and validate against the BigQuery pacing data.
  3. Calculate the following pacing metrics:
     - **Days elapsed** in the current month (including today)
     - **Days remaining** in the current month (excluding today)
     - **Ideal linear spend-to-date:** (monthly budget / days in month) *
       days elapsed. This is the baseline pace assuming even daily spend.
     - **Actual spend-to-date:** total spend across all platforms from
       the 1st of the month through yesterday (today's data is incomplete).
     - **Pacing variance:** (actual spend-to-date - ideal spend-to-date) /
       ideal spend-to-date, expressed as a percentage.
     - **Current daily average:** actual spend-to-date / days elapsed.
     - **Projected end-of-month spend:** actual spend-to-date + (current
       daily average * days remaining).
     - **Required daily average:** (monthly budget - actual spend-to-date) /
       days remaining. This is how much needs to be spent per day for the
       rest of the month to exactly hit the budget cap.
  4. Break all metrics down by platform (Google Ads, Meta) in addition to
     the aggregate total.
  5. Classify overall pacing status:
     - **On Track:** pacing variance is within +/-5% of linear pace.
       No action needed, current trajectory will land within budget.
     - **Slightly Over-Pacing:** variance is +5% to +15% ahead of pace.
       Risk of exhausting budget 2-5 days early. Monitor.
     - **Significantly Over-Pacing:** variance is >+15% ahead of pace.
       Budget will likely run out before month end, leaving days with no
       spend and missed opportunity at end of month.
     - **Slightly Under-Pacing:** variance is -5% to -15% behind pace.
       Leaving money on the table. May need to increase daily budgets
       or launch additional campaigns to catch up.
     - **Significantly Under-Pacing:** variance is >-15% behind pace.
       Significant budget is going unspent. Either campaigns are
       budget-constrained by daily caps or there is insufficient demand.
  6. Also classify each platform individually using the same thresholds,
     since one platform may be over-pacing while the other is under-pacing.
  7. Check for spend volatility: calculate the standard deviation of daily
     spend over the last 7 days. If the coefficient of variation (std dev /
     mean) is greater than 0.3, flag it as volatile — projections based on
     the daily average may be unreliable.

prompt_template: |
  Run a quick budget pacing check for the current month.
  Analysis date: {analysis_date}

  Connected Accounts:
  {accounts_block}

  Pull current month spend data from BigQuery pacing tables and validate
  against platform-reported spend. Determine whether we are on track to
  hit the monthly budget cap.

  {extra_instructions}

output_format: |
  ## Pacing Status
  One-line summary using status indicators:
  - On Track: spend is pacing within +/-5% of the linear monthly target.
  - Slightly Off: one or more platforms are 5-15% off pace. Monitor.
  - Significantly Off: pacing variance exceeds 15%. Action may be needed.

  ## Pacing Summary Table
  Table with columns: Platform | Monthly Cap | Spent-to-Date | Ideal Spend
  (linear) | Variance (%) | Projected EOM Spend | Status

  Include a TOTAL row summing across all platforms.

  ## Daily Rate Check
  - Current daily average spend: $XX
  - Required daily average to hit target: $XX
  - Difference: +/-$XX per day
  - If significantly different, note how many days of catch-up or
    pull-back would be needed.

  ## Spend Trend (Last 7 Days)
  Brief note on whether daily spend has been stable, trending up, or
  trending down over the last 7 days. Flag if spend is volatile (high
  day-to-day variance) which makes projections less reliable.

  ## Quick Action Items
  Brief, actionable flags. Do NOT recommend specific budget changes —
  that is the job of the budget_reallocation skill. Instead:
  - Flag the pacing status and projected shortfall or overshoot
  - Note which platform is most off-pace
  - Suggest running budget_reallocation if significant action is needed

business_guidance: |
  - This is a quick check, not a deep budget analysis. Report the pacing
    numbers clearly but do not recommend specific budget changes. Point
    users to the budget_reallocation skill for reallocation recommendations.
  - Use linear pacing (even daily spend) as the baseline, but note in the
    output that many advertisers intentionally front-load spend at the
    start of the month or back-load toward the end for promotional periods.
    Linear pacing is a useful benchmark, not a rigid expectation.
  - Account for weekday/weekend spend patterns when assessing volatility.
    Most accounts spend 20-40% less on weekends. A drop on Saturday is
    normal, not a pacing issue. Use weekday-only averages for more
    accurate daily rate calculations when possible.
  - The first 3 days of any month have very limited data. Pacing
    assessments made before the 4th day of the month should be flagged as
    preliminary with a note that the sample is too small for reliable
    projections.
  - If the budget_pacing BigQuery table and the platform-reported spend
    disagree by more than 5%, flag the discrepancy and note which source
    you are using for the assessment. BigQuery is the source of truth.
  - Over-pacing is generally a more urgent problem than under-pacing.
    Running out of budget early means zero spend on remaining days, which
    is almost always worse than having a small budget surplus at month end.
  - Do not confuse daily budget caps with monthly budget caps. Campaigns
    may have daily caps that are on track individually but sum to a monthly
    total that is off-pace.

schedule: "0 12 * * *"
chain_after: null
requires_approval: false
min_clearance: internal
